# ─── HTTP: redirect to HTTPS + ACME challenge ────────────────────────
server {
    listen 80;
    server_name agent.brunas.lt;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── HTTPS ────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name agent.brunas.lt;

    ssl_certificate     /etc/letsencrypt/live/agent.brunas.lt/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/agent.brunas.lt/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    client_max_body_size 20m;

    # ── Auth endpoints — no session check needed ──────────────────────
    location /auth/ {
        proxy_pass http://agent:3002;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Internal: validate session cookie via agent server ────────────
    location = /_auth_check {
        internal;
        proxy_pass              http://agent:3002/auth/validate;
        proxy_pass_request_body off;
        proxy_set_header        Content-Length "";
        proxy_set_header        Cookie $http_cookie;
    }

    # ── Everything else → Open WebUI (after auth check) ───────────────
    location / {
        auth_request     /_auth_check;
        auth_request_set $auth_email $upstream_http_x_user_email;
        auth_request_set $auth_super $upstream_http_x_user_super;

        # Unauthenticated → redirect to login page
        error_page 401 = @login_redirect;

        proxy_pass http://open-webui:8080;

        # Pass user identity to Open WebUI (trusted header auth)
        proxy_set_header X-User-Email      $auth_email;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (Open WebUI uses it)
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        # SSE / streaming support
        proxy_buffering off;
        proxy_cache     off;
    }

    location @login_redirect {
        return 302 /auth/login;
    }
}
